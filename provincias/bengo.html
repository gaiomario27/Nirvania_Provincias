<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Província do Bengo</title>

    <!-- CSS externo -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <!-- TÍTULO -->
        <h1 class="titulo">Bengo</h1>

        <!-- DESCRIÇÃO -->
        <p class="descricao">
            O Bengo é uma província de Angola conhecida pela sua natureza,
            rios, zonas agrícolas e paisagens tranquilas. É uma região com
            grande potencial turístico e ecológico.
        </p>

        <!-- INFO -->
        <div class="info">

            <div class="box">
                <h4>Capital</h4>
                <p>Caxito</p>
            </div>

            <div class="box">
                <h4>Destaque</h4>
                <p>Natureza</p>
            </div>

            <div class="box">
                <h4>Turismo</h4>
                <p>Rios e paisagens</p>
            </div>

        </div>

        <!-- IMAGEM -->
        <div class="imagem">
            <img src="imagens/bengo.jpg" alt="Província do Bengo">
        </div>

        <!-- VÍDEO -->
        <div class="video">
            <video controls>
                <source src="videos/bengo.mp4" type="video/mp4">
            </video>
        </div>

    </div>



</body>
</html>
